<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Trámites — Municipalidad de Yau</title>
    <meta name="description" content="Panel de gestión de trámites municipales con clasificación IA">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Transición suave del submenu */
        #submenu-tramites { transition: all 0.2s ease; }
        #arrow-tramites   { transition: transform 0.2s ease; }
        /* Scroll personalizado estilo Cyberpunk / Oscuro */
        #content::-webkit-scrollbar        { width: 6px; }
        #content::-webkit-scrollbar-track  { background: #070D1E; }
        #content::-webkit-scrollbar-thumb  { background: #1C2541; border-radius: 3px; }
        #content::-webkit-scrollbar-thumb:hover { background: #E5C158; }
    </style>
</head>
<body class="flex h-screen bg-[#070D1E] overflow-hidden text-slate-100">

    <aside id="sidebar"
        class="w-64 bg-[#0B132B] flex flex-col flex-shrink-0 shadow-2xl border-r border-[#1C2541]">

        <div class="px-5 py-5 border-b border-[#1C2541]">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-[#E5C158]/10 border border-[#E5C158]/30 rounded-xl flex items-center justify-center flex-shrink-0 shadow-[0_0_10px_rgba(229,193,88,0.1)]">
                    <i class="fa-solid fa-landmark text-[#E5C158] text-sm"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-slate-100 font-bold text-sm leading-tight truncate tracking-wide">Municipalidad</p>
                    <p class="text-[#E5C158] text-xs font-medium leading-tight tracking-wider">Distrital de Yau</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

            <a href="#" data-view="dashboard"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-400 hover:bg-[#1C2541]/50 hover:text-[#E5C158] transition-all group duration-200">
                <i class="fa-solid fa-table-columns w-5 text-center text-sm group-hover:scale-110 transition-transform"></i>
                <span class="font-medium">Dashboard</span>
            </a>

            <div>
                <button id="btn-tramites-dropdown"
                    class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm text-slate-400 hover:bg-[#1C2541]/50 hover:text-slate-200 transition-all duration-200">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-folder-tree w-5 text-center text-sm"></i>
                        <span class="font-medium">Trámites</span>
                    </div>
                    <i id="arrow-tramites" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                </button>

                <div id="submenu-tramites" class="hidden ml-4 mt-1 space-y-1 pl-3 border-l border-[#1C2541]">
                    <a href="#" data-view="bandeja"
                        class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-[#1C2541]/30 hover:text-[#E5C158] transition-colors">
                        <i class="fa-solid fa-list-ul text-xs"></i> Bandeja
                    </a>
                    <a href="#" data-view="nuevoTramite"
                        class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-[#1C2541]/30 hover:text-[#E5C158] transition-colors">
                        <i class="fa-solid fa-plus text-xs"></i> Nuevo Trámite
                    </a>
                </div>
            </div>

            <a href="#" data-view="monitorIA"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-400 hover:bg-[#1C2541]/50 hover:text-slate-200 transition-all group duration-200">
                <i class="fa-solid fa-brain w-5 text-center text-sm text-violet-400 group-hover:scale-110 transition-transform"></i>
                <span class="font-medium">Monitor IA</span>
                <span class="ml-auto text-[10px] font-bold bg-violet-500/20 text-violet-400 border border-violet-500/30 px-1.5 py-0.5 rounded-md uppercase tracking-wider">IA</span>
            </a>

            <a href="#" data-view="ciudadanos"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-400 hover:bg-[#1C2541]/50 hover:text-[#E5C158] transition-all group duration-200">
                <i class="fa-solid fa-users w-5 text-center text-sm group-hover:scale-110 transition-transform"></i>
                <span class="font-medium">Ciudadanos</span>
            </a>

            <div class="pt-4 pb-1">
                <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Administración</p>
            </div>

            <div id="nav-admin">
                <a href="#" data-view="empleados"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-400 hover:bg-[#1C2541]/50 hover:text-slate-200 transition-all group duration-200">
                    <i class="fa-solid fa-id-card-clip w-5 text-center text-sm group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">Empleados</span>
                </a>
            </div>
        </nav>

        <div class="px-4 py-4 border-t border-[#1C2541] bg-[#090F21]">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-[#61A5FA]/10 border border-[#61A5FA]/20 text-[#61A5FA] flex items-center justify-center font-bold flex-shrink-0">
                    <i class="fa-solid fa-user-shield text-xs"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <p id="nav-nombre-usuario" class="text-slate-200 text-xs font-semibold truncate">Cargando...</p>
                    <p id="nav-rol-usuario" class="text-[#E5C158] text-[10px] uppercase font-bold tracking-wider mt-0.5"></p>
                </div>
                <button id="btn-logout" title="Cerrar sesión"
                    class="text-slate-500 hover:text-red-400 p-1.5 rounded-lg hover:bg-red-500/10 border border-transparent hover:border-red-500/20 transition-all duration-200 flex-shrink-0">
                    <i class="fa-solid fa-power-off text-sm"></i>
                </button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden bg-[#070D1E]">

        <header class="bg-[#0B132B] border-b border-[#1C2541] px-6 py-4 flex items-center justify-between flex-shrink-0 shadow-lg">
            <div>
                <p class="text-sm font-bold text-slate-200 tracking-wide">Sistema de Trámites Municipales</p>
                <p class="text-xs text-slate-500 mt-0.5">Gestión interna con clasificación inteligente automatizada</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="flex items-center gap-1.5 text-[11px] font-semibold text-emerald-400 bg-emerald-500/5 border border-emerald-500/20 px-3 py-1 rounded-full shadow-inner">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                    Servidor en línea
                </span>
            </div>
        </header>

        <main id="content" class="flex-1 overflow-y-auto p-6 bg-[#070D1E]">
            </main>
    </div>

    <script type="module">
        import { guard, getUsuario }        from '/js/auth.js';
        import { initSidebar }  from '/js/components/sidebar.js';
        import { initNavbar }   from '/js/components/navbar.js';
        import { initRouter }   from '/js/router.js';

        // Proteger la página: si no hay JWT redirige al login
        if (!guard()) throw new Error('No autenticado');

        const usuarioLogueado = getUsuario();

        // 1. Inicializar componentes primero (para que carguen el texto base)
        initSidebar();
        initNavbar();

        // 2. Corrección del Rol y Control de Accesos (¡Ahora se ejecuta después!)
        if (usuarioLogueado) {
            // Apuntamos al ID real de tu HTML: 'nav-rol-usuario'
            const roleBadge = document.getElementById('nav-rol-usuario'); 
            
            if (roleBadge) {
                roleBadge.textContent = usuarioLogueado.nombre_rol.toUpperCase();
                
                // Si es ciudadano (Rol 4), cambiamos el color a un azul celeste premium
                if (usuarioLogueado.id_rol === 4) {
                    roleBadge.className = "text-blue-400 text-[10px] uppercase font-bold tracking-wider mt-0.5";
                }
            }

            // Ocultar secciones restringidas si es Ciudadano
            if (usuarioLogueado.id_rol === 4) {
                const monitorIALink = document.querySelector('[data-view="monitorIA"]');
                const ciudadanosLink = document.querySelector('[data-view="ciudadanos"]');
                const dashboardLink = document.querySelector('[data-view="dashboard"]');
                
                if (monitorIALink) monitorIALink.classList.add('hidden');
                if (ciudadanosLink) ciudadanosLink.classList.add('hidden');
                if (dashboardLink) dashboardLink.classList.add('hidden');
            }
        }
            
        // 3. Iniciar en la bandeja o el dashboard según corresponda
        const vistaInicial = (usuarioLogueado?.id_rol === 4) ? 'bandeja' : 'dashboard';
        initRouter(vistaInicial);
    </script>
</body>
</html>
